steps:
  # Build lightning-optimized image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--platform', 'linux/amd64',
      '-t', 'gcr.io/$PROJECT_ID/invoice-parser-backend:lightning',
      '.'
    ]

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/invoice-parser-backend:lightning']

  # Deploy to Cloud Run with aggressive optimizations
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'invoice-parser-backend',
      '--image', 'gcr.io/$PROJECT_ID/invoice-parser-backend:lightning',
      '--region', 'us-central1',
      '--platform', 'managed',
      '--cpu', '2',
      '--memory', '4Gi',
      '--min-instances', '1',
      '--max-instances', '10',
      '--concurrency', '1000',
      '--set-env-vars', 'GEMINI_MODEL_NAME=gemini-2.5-flash'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'  # High-performance build machine

timeout: '1200s'  # 20 minutes timeout