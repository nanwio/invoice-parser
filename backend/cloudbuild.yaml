steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/invoice-parser:$COMMIT_SHA', './backend']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/invoice-parser:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'invoice-parser-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/invoice-parser:$COMMIT_SHA'
      - '--region'
      - 'europe-west4'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--timeout'
      - '300s'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--port'
      - '8000'
      - '--update-env-vars'
      - 'PORT=8000,ENVIRONMENT=production,GEMINI_API_KEY=AIzaSyBHYapelDDrPCEqT2Sp3WEVCrtG96Bxpdw,GEMINI_MODEL_NAME=gemini-2.5-flash-lite,SECRET_KEY=d267baf1c866603de5c78bcb88a52f60ef78cd615d5239d08322e513e608726b,REDIS_URL=redis://localhost:6379/0'

images:
  - 'gcr.io/$PROJECT_ID/invoice-parser:$COMMIT_SHA'

# Build options to fix service account logging requirement
options:
  logging: CLOUD_LOGGING_ONLY