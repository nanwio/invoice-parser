steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "backend/Dockerfile"
      - "-t"
      - "gcr.io/$PROJECT_ID/invoice-parser:$BUILD_ID"
      - "."

  # Push the container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/invoice-parser:$BUILD_ID"]

  # Deploy container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "invoice-parser-api"
      - "--image"
      - "gcr.io/$PROJECT_ID/invoice-parser:$BUILD_ID"
      - "--region"
      - "europe-west4"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "16Gi"
      - "--cpu"
      - "8"
      - "--timeout"
      - "300s"
      - "--max-instances"
      - "10"
      - "--min-instances"
      - "0"
      - "--port"

      - "8000"
      - "--update-env-vars"
      - "ENVIRONMENT=production,GEMINI_MODEL_NAME=gemini-2.5-flash-lite"
      - "--update-secrets"
      - "GEMINI_API_KEY=GEMINIAPIKEY:latest,JWT_SECRET_KEY=SECRETKEY:latest,REDIS_URL=REDISURL:latest"

images:
  - "gcr.io/$PROJECT_ID/invoice-parser:$BUILD_ID"

# Build options to fix service account logging requirement
options:
  logging: CLOUD_LOGGING_ONLY
