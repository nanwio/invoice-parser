steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'backend/Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/invoice-parser:$COMMIT_SHA'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/invoice-parser:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'invoice-parser-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/invoice-parser:$COMMIT_SHA'
      - '--region'
      - 'europe-west4'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '16Gi'
      - '--cpu'
      - '8'
      - '--timeout'
      - '300s'
      - '--max-instances'
      - '10'
      - '--min-instances'
      - '0'
      - '--port'
      - '8000'
      - '--update-env-vars'
      - 'ENVIRONMENT=production,GEMINI_MODEL_NAME=gemini-2.5-flash-lite,REDIS_URL=redis://default:tFufJcQJUsWWzZ9lGUMF22Kv2LeSUk7B@redis-11003.c328.europe-west3-1.gce.redns.redis-cloud.com:11003'
      - '--update-secrets'
      - 'GEMINI_API_KEY=GEMINIAPIKEY:latest,JWT_SECRET_KEY=SECRETKEY:latest'

images:
  - 'gcr.io/$PROJECT_ID/invoice-parser:$COMMIT_SHA'

# Build options to fix service account logging requirement
options:
  logging: CLOUD_LOGGING_ONLY